<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Scanner</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            margin-top: 50px;
            background: rgba(255, 255, 255, 0.08);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            border-radius: 10px;
            border: none;
            padding: 10px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        input[type="file"] {
            margin-bottom: 15px;
            color: white;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #6c63ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #5848d6;
        }

        .results {
            margin-top: 30px;
            width: 500px;
        }

        .card {
            background: rgba(255,255,255,0.08);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .logout {
            margin-top: 20px;
            text-align: center;
        }

        .logout a {
            color: #9d8bff;
            text-decoration: none;
        }

        .logout a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    

    <div class="container">
        <h1>🚀 AI Resume Scanner</h1>

        <form method="POST" enctype="multipart/form-data">
            <textarea name="job_desc" placeholder="Paste job description here..." required></textarea>

            <input type="file" name="resume" required>

            <button type="submit">Scan Now</button>
        </form>

        <div class="logout">
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div class="results">
        {% for r in results %}
            <div class="card">
                <strong>{{ r.name }}</strong><br>
                Match Score: {{ r.score }}%
            </div>
        {% endfor %}
    </div>

</body>
</html>
